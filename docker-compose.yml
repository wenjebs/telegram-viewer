services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - ~/Library/Application Support/Caddy/pki:/data/caddy/pki
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      DB_PATH: /data/telegram_viewer.db
      SESSION_PATH: /data/tg_session
      CACHE_DIR: /data/cache
      CORS_ORIGINS: "https://tele.view"
    volumes:
      - app-data:/data
      - insightface-models:/root/.insightface
    profiles:
      - prod
    restart: unless-stopped

  backend-dev:
    build: ./backend
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      DB_PATH: /data/telegram_viewer.db
      SESSION_PATH: /data/tg_session
      CACHE_DIR: /data/cache
      CORS_ORIGINS: "https://tele.view"
    volumes:
      - app-data:/data
      - insightface-models:/root/.insightface
      - ./backend:/app
    networks:
      default:
        aliases:
          - backend
    profiles:
      - dev
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      PORT: 3000
    profiles:
      - prod
    restart: unless-stopped

  frontend-dev:
    image: oven/bun:1
    working_dir: /app
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port 3000"
    environment:
      PORT: 3000
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    networks:
      default:
        aliases:
          - frontend
    profiles:
      - dev
    restart: unless-stopped

volumes:
  app-data:
  insightface-models:
  frontend-node-modules:
